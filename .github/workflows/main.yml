name: Build and Upload

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          java-version: '26'
          distribution: 'liberica'
          architecture: x64
          check-latest: true
          cache: maven

      - name: Build by maven wrapper
        run: chmod +x ./mvnw; ./mvnw -B -U package

      - name: Upload a Build Artifact
        uses: actions/upload-artifact@v6
        with:
          path: ./target/install/*
