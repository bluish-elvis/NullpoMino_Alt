name: Build and Upload

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          java-version: '26'
          distribution: 'liberica'
          architecture: x64
          check-latest: true
          cache: maven

      - name: Build by maven wrapper
        env:
          MAVEN_OPTS: >-
            -Dmaven.wagon.http.timeout=120000
            -Dmaven.wagon.rto=120000
            -Dmaven.wagon.http.retryHandler.count=5
            -Dmaven.wagon.httpconnectionManager.ttlSeconds=120
        run: chmod +x ./mvnw; ./mvnw -B -U package
#          for i in 1 2 3; do
#            ./mvnw -B -U -ntp package && break
#            if [ "$i" -eq 3 ]; then
#              echo "Maven build failed after 3 attempts"
#              exit 1
#            fi
#            echo "Retrying Maven build ($i/3 failed)..."
#            sleep 10
#          done

      - name: Upload a Build Artifact
        uses: actions/upload-artifact@v6
        with:
          path: ./target/install/*
